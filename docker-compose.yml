services:
  # --- DATABASE GRAPH (Memgraph) ---
  # Gestisce la persistenza dei nodi e delle relazioni del codice
  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: memgraph_db
    ports:
      - "7687:7687"  # Connessione per il driver Python (Bolt)
    networks:
      - ai_network

  # --- MEMGRAPH LAB (Interfaccia grafica) ---
  # Si connette a Memgraph via Bolt e offre la GUI sul browser
  memgraph-lab:
    image: memgraph/lab:latest
    container_name: memgraph_lab
    ports:
      - "3000:3000"  # Interfaccia grafica: http://localhost:3000
    depends_on:
      - memgraph
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    networks:
      - ai_network

  # --- TUA API FASTAPI (Software Analyzer) ---
  # Analizza il codice e comunica con l'AI
  app:
    build: .
    container_name: software_analyzer_app
    ports:
      - "8000:8000"  # Swagger UI: http://localhost:8000/docs
    tty: true
    stdin_open: true
    depends_on:
      - memgraph
    # Nota: I volumi sono stati rimossi per evitare errori di mount su Windows/WSL2
    environment:
      - MEMGRAPH_HOST=memgraph
      - MEMGRAPH_PORT=7687
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Avvio standard di Uvicorn
    command: uvicorn main_api:app --host 0.0.0.0 --port 8000
    networks:
      - ai_network

networks:
  ai_network:
    driver: bridge